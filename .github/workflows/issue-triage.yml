name: Issue Triage
run-name: |
  Triage: #${{ github.event.issue.number || inputs.issue_number }}

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage"
        required: true
        type: number

permissions:
  issues: write
  contents: read

concurrency:
  group: issue-triage-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Triage Issue
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event.sender.login != 'github-actions[bot]'
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}

    steps:
      - name: Check trigger conditions
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          SENDER: ${{ github.event.sender.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          labels=$(gh issue view "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json labels --jq '[.labels[].name]')

          # Check if this is a /Triage command in a comment
          is_triage_command=false
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            comment_body=$(gh api \
              "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" \
              --jq '.body' 2>/dev/null)
            if printf '%s' "$comment_body" \
                | grep -qi '/triage'; then
              is_triage_command=true
              echo "Detected /Triage command in comment"
            fi
          fi

          # Skip owner comments unless they contain /Triage
          if [[ "$EVENT_NAME" == "issue_comment" && "$SENDER" == "aaddrick" \
              && "$is_triage_command" != "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: owner comment without /Triage command"
            exit 0
          fi

          # Treat /Triage command like a manual dispatch (bypasses all gates)
          if [[ "$is_triage_command" == "true" \
              || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual triage requested, bypassing gate checks"
            exit 0
          fi

          # For issue_comment: only re-triage if needs-info label is present
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            if ! printf '%s' "$labels" \
                | jq -e 'any(. == "triage: needs-info")' >/dev/null 2>&1; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Skipping: comment on issue without needs-info label"
              exit 0
            fi
          fi

          # Always skip needs-human unless manually triggered
          if printf '%s' "$labels" \
              | jq -e 'any(. == "triage: needs-human")' >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: issue requires human triage"
            exit 0
          fi

          # Skip if already triaged (except reopened)
          if [[ "$EVENT_ACTION" != "reopened" ]]; then
            terminal_labels='["triage: investigated", "triage: duplicate", "triage: not-actionable"]'
            if printf '%s' "$labels" \
                | jq -e --argjson terms "$terminal_labels" \
                  'any(. as $l | $terms | any(. == $l))' >/dev/null 2>&1; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Skipping: issue already triaged"
              exit 0
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        if: steps.gate.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Gather issue context
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch full issue details
          gh issue view "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json number,title,body,labels,comments,author,state,createdAt \
            > /tmp/issue.json

          # Extract title for searching related context
          title=$(jq -r '.title' /tmp/issue.json)

          # Search for related issues (open and closed)
          gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --search "$title" \
            --state all \
            --limit 10 \
            --json number,title,state,labels \
            > /tmp/related-issues.json

          # Search for related PRs (open and closed)
          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --search "$title" \
            --state all \
            --limit 10 \
            --json number,title,state \
            > /tmp/related-prs.json

      - name: "Phase 1: Classify issue"
        if: steps.gate.outputs.skip != 'true'
        id: classify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          schema=$(cat .claude/scripts/schemas/triage-classify.json)

          # Build prompt from template + data files (avoids shell injection)
          jq -n \
            --slurpfile issue /tmp/issue.json \
            --slurpfile related_issues /tmp/related-issues.json \
            --slurpfile related_prs /tmp/related-prs.json \
            --rawfile claude_md CLAUDE.md \
            -r '"You are classifying a GitHub issue for the claude-desktop-debian project.\nThis project repackages Claude Desktop (Electron app) for Debian/Ubuntu Linux.\n\n## Project Context\n" + $claude_md + "\n\n## Issue\n" + ($issue[0] | tostring) + "\n\n## Related Issues\n" + ($related_issues[0] | tostring) + "\n\n## Related PRs\n" + ($related_prs[0] | tostring) + "\n\n## Label Glossary\nOnly suggest labels that accurately apply. Here is what each label means:\n- bug: Confirmed or likely software defect in THIS project (packaging, patching, build scripts)\n- enhancement: New feature request or improvement to this project\n- question: Usage question, not a bug or feature request\n- duplicate: This issue duplicates another existing issue\n- upstream: Bug exists in Claude Desktop itself, not in our packaging/patching. NOTE: This project prefers to patch upstream issues when feasible rather than just labeling them upstream. Only use this label when a patch is clearly impractical.\n- regression: Previously working functionality that broke in a newer release\n- security: Security-related issue (always set skip_comment=true for these)\n- cowork: Related to Cowork mode ONLY — the VM-based Claude Code session feature launched from the desktop app Code tab. Do NOT use for general Code tab issues or session history issues.\n- mcp: Related to MCP (Model Context Protocol) server/plugin integration\n- blocked: Waiting on an external dependency to be resolved\n- needs reproduction: Cannot reproduce, need more info from reporter\n- platform: amd64 / platform: arm64: Issue is specific to one CPU architecture\n- format: deb / format: appimage / format: rpm / format: nix: Issue is specific to one package format\n- priority: critical: Blocks usage for most users\n- priority: high: Important, should be addressed soon\n- priority: medium: Should be addressed when possible\n- priority: low: Nice to have, not urgent\n\n## Instructions\n1. Read the issue carefully. Consider the title, body, and any comments.\n2. Check the related issues and PRs for duplicates or prior discussion.\n3. Classify the issue into one of: bug, feature, question, duplicate, needs-info, not-actionable, needs-human.\n4. Set skip_comment to true if: classification is needs-human, you have low confidence on a complex or sensitive issue, or the issue involves security concerns.\n5. Set needs_source_investigation to true only if understanding the upstream Claude Desktop JavaScript source would help investigate.\n6. Suggest additional labels from the Label Glossary above. Only apply labels you are confident are correct.\n7. If classifying as duplicate, set duplicate_of to the issue number.\n8. If classifying as needs-info, list specific questions to ask."' \
            > /tmp/classify-prompt.txt

          result=$(claude -p "$(cat /tmp/classify-prompt.txt)" \
            --output-format json \
            --json-schema "$schema" \
            --model claude-sonnet-4-6 \
            --max-budget-usd 2.00 \
            2>/dev/null) || {
              echo "::error::Claude classification failed"
              exit 1
            }

          # Extract structured output (key is .structured_output per claude CLI)
          structured=$(printf '%s' "$result" \
            | jq -c '.structured_output // empty' 2>/dev/null)

          if [[ -z "$structured" ]]; then
            echo "::error::No structured output from classification"
            exit 1
          fi

          printf '%s' "$structured" > /tmp/classification.json

          classification=$(jq -r '.classification' /tmp/classification.json)
          skip_comment=$(jq -r '.skip_comment // false' /tmp/classification.json)
          needs_investigation=$(jq -r '.needs_source_investigation' \
            /tmp/classification.json)

          {
            echo "classification=$classification"
            echo "skip_comment=$skip_comment"
            echo "needs_investigation=$needs_investigation"
          } >> "$GITHUB_OUTPUT"

          echo "Classification: $classification (skip_comment=$skip_comment)"

      - name: Apply labels
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          classification=$(jq -r '.classification' /tmp/classification.json)

          # Remove old triage labels and needs triage
          for label in \
            "triage: investigated" \
            "triage: needs-info" \
            "triage: duplicate" \
            "triage: not-actionable" \
            "triage: needs-human" \
            "needs triage"; do
            gh issue edit "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --remove-label "$label" 2>/dev/null || true
          done

          # Map classification to triage label
          case "$classification" in
            bug|feature|question)
              triage_label="triage: investigated"
              ;;
            duplicate)
              triage_label="triage: duplicate"
              ;;
            needs-info)
              triage_label="triage: needs-info"
              ;;
            not-actionable)
              triage_label="triage: not-actionable"
              ;;
            needs-human)
              triage_label="triage: needs-human"
              ;;
            *)
              triage_label="triage: needs-human"
              ;;
          esac

          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --add-label "$triage_label"

          # Apply additional suggested labels
          suggested=$(jq -r '.suggested_labels[]? // empty' \
            /tmp/classification.json 2>/dev/null)
          while IFS= read -r label; do
            if [[ -n "$label" ]]; then
              gh issue edit "$ISSUE_NUMBER" \
                --repo "$GITHUB_REPOSITORY" \
                --add-label "$label" 2>/dev/null || true
            fi
          done <<< "$suggested"

          echo "Applied triage label: $triage_label"

      - name: Check if comment should be skipped
        if: steps.gate.outputs.skip != 'true'
        id: check_skip
        run: |
          if [[ "${{ steps.classify.outputs.skip_comment }}" == "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping comment (skip_comment=true)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Phase 2: Download reference source (conditional)"
        if: >-
          steps.gate.outputs.skip != 'true'
          && steps.check_skip.outputs.skip != 'true'
          && steps.classify.outputs.needs_investigation == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/ref-source
          gh release download \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'reference-source*' \
            --dir /tmp/ref-source 2>/dev/null || {
              echo "::warning::Could not download reference-source artifact"
              exit 0
            }
          tar -xzf /tmp/ref-source/reference-source.tar.gz \
            -C /tmp/ref-source/ 2>/dev/null || {
              echo "::warning::Could not extract reference-source"
              exit 0
            }
          echo "Reference source extracted to /tmp/ref-source/app-extracted/"

      - name: "Phase 2b: Investigate with source (conditional)"
        if: >-
          steps.gate.outputs.skip != 'true'
          && steps.check_skip.outputs.skip != 'true'
          && steps.classify.outputs.needs_investigation == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Build investigation prompt from files (avoids shell injection)
          {
            echo "Investigate the following GitHub issue for the claude-desktop-debian project."
            echo ""
            echo "## Classification"
            cat /tmp/classification.json
            echo ""
            echo "## Investigation Hints"
            jq -r '.investigation_hints // "None"' /tmp/classification.json
            echo ""
            echo "The project repository is at $(pwd). Search the source code for relevant patterns."
            if [[ -d /tmp/ref-source/app-extracted ]]; then
              echo "The beautified reference source (upstream app.asar) is at /tmp/ref-source/app-extracted/."
              echo "Key files: .vite/build/index.js (main process), .vite/build/mainWindow.js, .vite/build/mainView.js."
            fi
            echo ""
            echo "Focus on finding the root cause or relevant code. Be specific about file paths and line numbers. Keep your findings concise."
          } > /tmp/investigate-prompt.txt

          investigation=$(claude -p "$(cat /tmp/investigate-prompt.txt)" \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            --max-budget-usd 1.00 \
            2>/dev/null) || {
              echo "::warning::Investigation failed, continuing without findings"
              exit 0
            }

          # Handle both JSON and plain text output
          if printf '%s' "$investigation" | jq -e '.result' >/dev/null 2>&1; then
            printf '%s' "$investigation" | jq -r '.result' > /tmp/investigation.txt
          else
            printf '%s' "$investigation" > /tmp/investigation.txt
          fi

      - name: "Phase 3: Generate triage comment"
        if: >-
          steps.gate.outputs.skip != 'true'
          && steps.check_skip.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Download voice profile
          voice_url="https://raw.githubusercontent.com/aaddrick/written-voice-replication/master/.claude/agents/aaddrick-voice.md"
          curl -fsSL "$voice_url" -o /tmp/voice-profile.md 2>/dev/null || true

          # Build comment prompt from files (avoids shell expansion issues)
          {
            cat << 'HEADER'
          Generate a triage comment for this GitHub issue.

          ## Writing Voice (CRITICAL — follow this exactly)
          The following voice profile defines HOW you write. Match this voice
          precisely. Every aspect of tone, sentence structure, and word choice
          must follow this profile. This is the most important instruction.
          HEADER
            echo ""
            if [[ -f /tmp/voice-profile.md ]]; then
              cat /tmp/voice-profile.md
            fi
            echo ""
            echo "## Project Context"
            cat CLAUDE.md
            echo ""
            echo "## Classification"
            cat /tmp/classification.json
            echo ""
            echo "## Related Issues"
            cat /tmp/related-issues.json
            echo ""
            echo "## Related PRs"
            cat /tmp/related-prs.json
            echo ""
            echo "## Investigation Findings"
            if [[ -f /tmp/investigation.txt ]]; then
              cat /tmp/investigation.txt
            else
              echo "No investigation performed."
            fi
            echo ""
            cat << 'INSTRUCTIONS'
          ## Formatting Constraints
          - This project prefers to patch upstream issues when feasible. Frame findings in terms of what could be patched, not "this is upstream, nothing we can do"
          - Lead with the finding, then reasoning
          - Keep to 2-4 short paragraphs
          - Use code blocks or links where helpful
          - Reference related issues/PRs if they provide useful context (use #NNN format)
          - Don't open with "Thank you for your report" or similar
          - Don't overpromise fixes or timelines
          - If the classification is "duplicate", link to the duplicate issue
          - If "needs-info", ask the specific questions from the classification
          - Output ONLY the comment text, no wrapping or explanation
          - End with this exact attribution block:

          ---
          Written by Claude Sonnet via [Claude Code](https://claude.ai/code)
          INSTRUCTIONS
          } > /tmp/comment-prompt.txt

          comment_result=$(claude -p "$(cat /tmp/comment-prompt.txt)" \
            --model claude-sonnet-4-6 \
            --max-budget-usd 2.00 \
            2>/dev/null) || {
              echo "::error::Comment generation failed"
              exit 1
            }

          # Handle both JSON (.result key) and plain text output
          if printf '%s' "$comment_result" | jq -e '.result' >/dev/null 2>&1; then
            printf '%s' "$comment_result" | jq -r '.result' > /tmp/comment.md
          else
            printf '%s' "$comment_result" > /tmp/comment.md
          fi

      - name: Post comment
        if: >-
          steps.gate.outputs.skip != 'true'
          && steps.check_skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -s /tmp/comment.md ]]; then
            gh issue comment "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/comment.md
            echo "Posted triage comment on issue #$ISSUE_NUMBER"
          else
            echo "::warning::Comment file is empty, skipping post"
          fi
